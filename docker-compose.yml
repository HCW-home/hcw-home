services:

  migrate:
    image: docker.io/iabsis/hcw6-backend:${TAG:-latest}
    command: >
      sh -c "
        echo 'Running migrations...';
        python manage.py migrate;
        echo 'Migration completed successfully';
      "
    environment:
      - REDIS_HOST=redis
      - DATABASE_HOST=db
      - DATABASE_USER=hcw
      - DATABASE_PASSWORD=hcw
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: backend
      target: api
    image: docker.io/iabsis/hcw6-backend:${TAG:-latest}
    restart: always
    environment:
      - REDIS_HOST=redis
      - DATABASE_HOST=db
      - DATABASE_USER=hcw
      - DATABASE_PASSWORD=hcw
    env_file:
      - backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  admin:
    build:
      context: backend
      target: admin
    image: docker.io/iabsis/hcw6-admin:${TAG:-latest}
    restart: always
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "8082:8080"

  celery:
    entrypoint: celery -A core.celery worker --loglevel=info
    image: docker.io/iabsis/hcw6-backend:${TAG:-latest}
    restart: always
    environment:
      - REDIS_HOST=redis
      - DATABASE_HOST=db
      - DATABASE_USER=hcw
      - DATABASE_PASSWORD=hcw
    env_file:
      - backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  scheduler:
    entrypoint: celery -A core beat --loglevel=info
    image: docker.io/iabsis/hcw6-backend:${TAG:-latest}
    restart: always
    environment:
      - REDIS_HOST=redis
      - DATABASE_HOST=db
      - DATABASE_USER=hcw
      - DATABASE_PASSWORD=hcw
    env_file:
      - backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  patient:
    build:
      context: patient
      target: patient
    image: docker.io/iabsis/hcw6-patient:${TAG:-latest}
    restart: always
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      - api
    ports:
      - "8081:8081"

  practitioner:
    build:
      context: practitioner
      target: practitioner
    image: docker.io/iabsis/hcw6-practitioner:${TAG:-latest}
    restart: always
    environment:
    - BACKEND_URL=http://api:8000
    depends_on:
      - api
    ports:
      - "8080:8080"

  db:
    image: docker.io/postgres:15
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=hcw
      - POSTGRES_USER=hcw
      - POSTGRES_PASSWORD=hcw
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/redis:7
    restart: always
    volumes:
      - ./data/redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

