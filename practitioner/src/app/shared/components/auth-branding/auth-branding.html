<div class="left-side">
  <div class="left-content">
    @if (siteLogoWhite) {
      <img [src]="siteLogoWhite" alt="Logo" class="logo-img" />
    } @else {
      <img src="/images/logo.svg" alt="Logo" class="logo-img" />
    }
    @if (branding) {
      <h1>{{ branding }}</h1>
    }
    @if (loginText) {
      <div class="login-text" [innerHTML]="loginText"></div>
    }
  </div>
</div>
