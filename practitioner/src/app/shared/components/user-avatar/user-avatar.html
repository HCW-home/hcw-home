<div class="user-avatar" [class.sm]="size === 'sm'" [class.md]="size === 'md'" [class.lg]="size === 'lg'" [class.current-user]="isCurrentUser">
  @if (picture) {
    <img [src]="picture" class="avatar-image" alt="">
  } @else {
    {{ initials }}
  }
  @if (showOnlineIndicator) {
    <span class="online-indicator" [class.online]="isOnline"></span>
  }
</div>
